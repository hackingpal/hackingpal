# OWASP crAPI — Completely Ridiculous API
#
# Stack: web (NGINX) + identity (Java/Spring) + community (Go) + workshop
# (Python/Flask), backed by mongodb + postgresdb, with mailhog as a fake
# inbox for the signup/verification flow.
#
# Vendored from the upstream crAPI docker-compose.yml at v0.10 — trimmed
# to the services we need, port-mapped to 127.0.0.1 only, and stripped of
# anything that exposes telemetry off-host.

name: mhp-lab-crapi

services:
  crapi-web:
    image: crapi/crapi-web:latest
    container_name: mhp-lab-crapi-web
    ports:
      - "127.0.0.1:8085:80"
    environment:
      - LISTEN_IP=0.0.0.0
      - LISTEN_PORT=80
      - IDENTITY_SERVICE=crapi-identity
      - COMMUNITY_SERVICE=crapi-community
      - WORKSHOP_SERVICE=crapi-workshop
    depends_on:
      - crapi-identity
      - crapi-community
      - crapi-workshop
    restart: unless-stopped

  crapi-identity:
    image: crapi/crapi-identity:latest
    container_name: mhp-lab-crapi-identity
    environment:
      - JWT_EXPIRATION_TIME=30000000
      - POSTGRES_HOST=postgresdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=crapisecretpassword
      - POSTGRES_NAME=crapi
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=no-reply@example.com
    depends_on:
      - postgresdb
      - mongodb
      - mailhog
    restart: unless-stopped

  crapi-community:
    image: crapi/crapi-community:latest
    container_name: mhp-lab-crapi-community
    environment:
      - IDENTITY_SERVICE=crapi-identity
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
    depends_on:
      - crapi-identity
      - mongodb
    restart: unless-stopped

  crapi-workshop:
    image: crapi/crapi-workshop:latest
    container_name: mhp-lab-crapi-workshop
    environment:
      - IDENTITY_SERVICE=crapi-identity
      - POSTGRES_HOST=postgresdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=crapisecretpassword
      - POSTGRES_NAME=crapi
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
    depends_on:
      - crapi-identity
      - postgresdb
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: mhp-lab-crapi-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=crapisecretpassword
    restart: unless-stopped

  postgresdb:
    image: postgres:14
    container_name: mhp-lab-crapi-postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=crapisecretpassword
      - POSTGRES_DB=crapi
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mhp-lab-crapi-mailhog
    ports:
      - "127.0.0.1:8095:8025"
    restart: unless-stopped
