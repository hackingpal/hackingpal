# Intentionally insecure vsftpd config for the Metasploitable lab.
# Anonymous logins on, write enabled, banner spoofed to vsFTPd 2.3.4.

listen=YES
listen_ipv6=NO

anonymous_enable=YES
anon_upload_enable=YES
anon_mkdir_write_enable=YES
no_anon_password=YES

local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES

xferlog_enable=YES
connect_from_port_20=YES

# Spoof the banner so nmap fingerprint matches the original Metasploitable.
ftpd_banner=(vsFTPd 2.3.4)

secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
ssl_enable=NO

seccomp_sandbox=NO
