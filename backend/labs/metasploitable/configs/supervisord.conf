[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/run/supervisord.pid

# ── Core services ────────────────────────────────────────────────────────────
[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autostart=false
autorestart=true
priority=5

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:vsftpd]
command=/usr/sbin/vsftpd /etc/vsftpd.conf
autostart=true
autorestart=true
priority=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xinetd]
command=/usr/sbin/xinetd -dontfork
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:postfix]
command=bash -c "/usr/sbin/postfix start-fg"
autostart=true
autorestart=true
priority=25
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:apache2]
# Source envvars so ${APACHE_RUN_DIR} etc. resolve; mkdir the run dir in case
# /var/run is tmpfs and got wiped on container restart.
command=bash -c "source /etc/apache2/envvars && mkdir -p $APACHE_RUN_DIR && rm -f $APACHE_PID_FILE && exec /usr/sbin/apache2 -DFOREGROUND"
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:smbd]
command=/usr/sbin/smbd --foreground --no-process-group
autostart=true
autorestart=true
priority=35
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nmbd]
command=/usr/sbin/nmbd --foreground --no-process-group
autostart=true
autorestart=true
priority=36
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:mariadb]
command=bash -c "mkdir -p /run/mysqld && chown mysql:mysql /run/mysqld && exec /usr/sbin/mariadbd --user=mysql --datadir=/var/lib/mysql"
autostart=true
autorestart=true
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:distccd]
command=/usr/bin/distccd --no-detach --daemon --allow 0.0.0.0/0 --listen 0.0.0.0 --log-stderr
autostart=true
autorestart=true
priority=45
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ── Emulated backdoors ───────────────────────────────────────────────────────
# These reproduce the famous Metasploitable demos. Without auth, anyone who
# connects gets a root shell. This is the *point* of a training lab — do NOT
# run this container on any reachable network.
[program:vsftpd-backdoor]
command=socat TCP-LISTEN:6200,reuseaddr,fork EXEC:/bin/sh
autostart=true
autorestart=true
priority=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ingreslock-backdoor]
command=socat TCP-LISTEN:1524,reuseaddr,fork EXEC:/bin/sh
autostart=true
autorestart=true
priority=51
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
