# Intentionally insecure Samba config for the Metasploitable lab.
# Null sessions, guest access, anonymous browsing, banner spoofed.

[global]
   workgroup = WORKGROUP
   server string = Samba Server Version 3.0.20-Debian
   server min protocol = NT1
   # No password for guest mappings.
   map to guest = Bad User
   guest account = nobody
   security = user
   # Allow null-session enumeration (the lab demo).
   restrict anonymous = 0
   # Reduce protocol strictness so older clients/tools work.
   client min protocol = NT1
   client max protocol = SMB3
   log file = /var/log/samba/log.%m
   max log size = 1000
   panic action = /usr/share/samba/panic-action %d

[public]
   comment = Anonymous public share — drop files here
   path = /srv/samba/public
   browseable = yes
   read only = no
   guest ok = yes
   guest only = yes
   create mask = 0666
   directory mask = 0777

[tmp]
   comment = Anonymous /tmp share
   path = /tmp
   browseable = yes
   read only = no
   guest ok = yes
