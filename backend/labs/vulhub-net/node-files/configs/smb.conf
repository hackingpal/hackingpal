[global]
   workgroup = LAB
   server string = node-files Samba — guest welcome
   security = user
   map to guest = Bad User
   guest account = nobody
   restrict anonymous = 0
   client min protocol = NT1
   client max protocol = SMB3
   log file = /var/log/samba/log.%m

[public]
   path = /srv/samba/public
   browseable = yes
   read only = no
   guest ok = yes
   guest only = yes
   create mask = 0666
   directory mask = 0777
