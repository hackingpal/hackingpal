services:
  backend:
    build:
      # Repo root, so the multi-stage Dockerfile can see both backend/ and
      # frontend/ (the Node stage compiles the React UI; the Python stage
      # serves it from /app/frontend_dist).
      context: .
      dockerfile: backend/Dockerfile
    image: hackingpal/backend:latest
    container_name: hackingpal-backend
    restart: unless-stopped
    # The image bundles both the API (all paths under /<router>/) and the
    # browser UI (served at /). Browse http://<host>:8765/ to use the UI;
    # the 5 privileged endpoints (terminal/exec, nmap/install, tcpdump/install,
    # vpn/start, vpn/stop) reject non-loopback callers, so the browser can't
    # invoke them — see SECURITY.md "Threat Model".
    ports:
      - "8765:8765"
    # NET_RAW: tcpdump + nmap SYN/UDP/OS raw sockets.
    # NET_ADMIN: WireGuard (wg-quick) interface setup.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - NT_BACKEND_HOST=0.0.0.0
      - NT_BACKEND_PORT=8765
      # Required to bypass the loopback-only startup guard in main.py.
      # See SECURITY.md "Threat Model" — Docker deploys deliberately lift
      # the restriction, so the auth token becomes the only gate on
      # privileged endpoints (tcpdump/nmap install, vpn, terminal/exec).
      - HACKINGPAL_ALLOW_PUBLIC_HOST=1
      # Optional: enables the chat assistant when running on Linux (no Keychain).
      # On macOS, the desktop app uses the Keychain instead; ignore this.
      # - ANTHROPIC_API_KEY=sk-ant-…
    volumes:
      - hackingpal-data:/app/data
    # For LAN scanning from the host's network (Linux only — Docker Desktop
    # on macOS/Windows runs Linux in a VM so host mode behaves differently),
    # comment out `ports:` above and uncomment:
    # network_mode: host

volumes:
  hackingpal-data:
