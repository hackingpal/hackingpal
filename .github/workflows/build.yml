# Build the HackingPal desktop app on a matrix of OSes.
#
# PyInstaller can only build for the OS it runs on — that's why this uses a
# matrix instead of cross-compiling. Each runner produces its native sidecar
# binary, then electron-builder packages it for that OS.
#
# Manual run:  Actions → "Build desktop app" → Run workflow
# Auto run:    push to main or any PR

name: Build desktop app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-smoke:
    # Fast feedback for PRs and main pushes. Boots the FastAPI app in-process
    # (no PyInstaller, no uvicorn) and probes the endpoints the renderer hits
    # on first paint plus a handful of WS handshake routes. If anything 500s,
    # the macOS release we ship from this branch was already broken — gate
    # the merge instead of finding out post-tag.
    name: Backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-bundle.txt

      - name: Install backend deps + test runner
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ -v

  frontend-build-gate:
    # Mirror the build step from the matrix in a standalone, fail-fast job
    # so PRs get a "frontend compiles" verdict in ~2 minutes without waiting
    # for the slow PyInstaller bundle. The matrix `build` job below still
    # runs the full packaging — this job is purely a guard.
    name: Frontend build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build renderer
        working-directory: frontend
        run: npm run build

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            target_args: --win
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend.exe
            artifact_glob: |
              frontend/dist-electron/*.exe
              frontend/dist-electron/*.msi
              frontend/dist-electron/*.nupkg
              frontend/dist-electron/*.blockmap
              frontend/dist-electron/latest*.yml
          - os: ubuntu-latest
            target: linux
            # Name targets explicitly so the runner only builds x64 variants.
            # Bare `--linux --x64` still iterates anything in the arch list
            # that has arm64 (AppImage does), producing a cross-arch AppImage
            # the x86_64 smoke test then trips over.
            target_args: --linux AppImage deb --x64
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend
            artifact_glob: |
              frontend/dist-electron/*.AppImage
              frontend/dist-electron/*.deb
              frontend/dist-electron/*.snap
              frontend/dist-electron/latest*.yml
          - os: ubuntu-24.04-arm
            target: linux
            # Name the AppImage target explicitly so electron-builder doesn't
            # also iterate the deb target (which would try to run an x86-only
            # fpm binary and crash with "Exec format error" on arm64). Just
            # restricting deb's arch list to x64 isn't enough — electron-builder
            # still attempts the build for that arch when no target name is
            # given. AppImage is the universal Linux format anyway.
            target_args: --linux AppImage --arm64
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend
            artifact_glob: |
              frontend/dist-electron/*.AppImage
          - os: macos-latest
            target: mac
            target_args: --mac
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend
            artifact_glob: |
              frontend/dist-electron/mac*/**
              frontend/dist-electron/*.dmg
              frontend/dist-electron/*.dmg.blockmap
              frontend/dist-electron/latest*.yml
              frontend/dist-electron/HackingPal-macos-arm64.zip

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    # Windows builds are best-effort — we ship Mac + Linux as the supported
    # targets. Letting Windows failures fail the whole workflow just generates
    # noisy notifications for a platform we're not actively maintaining.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-bundle.txt

      - name: Install backend bundle deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt

      - name: Build PyInstaller sidecar
        working-directory: backend
        run: pyinstaller network-tools-backend.spec --noconfirm

      - name: Verify sidecar exists
        shell: bash
        run: |
          if [[ ! -f "${{ matrix.sidecar_path }}" ]]; then
            echo "::error::sidecar not at ${{ matrix.sidecar_path }}"
            ls -la backend/dist/
            exit 1
          fi
          ls -lh "${{ matrix.sidecar_path }}"

      - name: Smoke-test sidecar (Windows)
        # Boot the freshly-built sidecar.exe, probe a handful of endpoints,
        # and confirm the OS-specific 501 guards return cleanly (no crashes).
        # Catches Windows-only import-time bugs (os.uname, PyObjC, posix shlex)
        # that the Linux smoke job can't see.
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          SIDECAR="${{ matrix.sidecar_path }}"
          LOG="$RUNNER_TEMP/sidecar.log"
          PIDFILE="$RUNNER_TEMP/sidecar.pid"

          # Launch the sidecar in the background. PyInstaller-onedir layout
          # means the .exe must run from its bundle dir (loads ./_internal/).
          BUNDLE_DIR="$(dirname "$SIDECAR")"
          (cd "$BUNDLE_DIR" && ./network-tools-backend.exe > "$LOG" 2>&1) &
          echo $! > "$PIDFILE"
          echo "sidecar PID=$(cat "$PIDFILE")"

          # Poll /health
          ready=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8765/health > "$RUNNER_TEMP/health.json" 2>/dev/null; then
              echo "::notice::sidecar healthy after ${i}s"
              cat "$RUNNER_TEMP/health.json"; echo
              ready=1; break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "::error::sidecar never became ready after 60s"
            echo "::group::Sidecar log"
            cat "$LOG" 2>/dev/null || echo "(no log)"
            echo "::endgroup::"
            exit 1
          fi

          # Fetch the per-launch auth token. /auth/token is loopback-only and
          # requires no header; everything privileged needs X-MHP-Token after.
          TOKEN=$(curl -fsS http://127.0.0.1:8765/auth/token | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$TOKEN" ]; then
            echo "::error::failed to fetch auth token from /auth/token"
            exit 1
          fi
          echo "::notice::fetched auth token (len=${#TOKEN})"

          # Helper: probe an endpoint and assert HTTP status. `want` may be
          # one status (e.g. "501") or a "|"-separated set ("200|503") for
          # endpoints whose acceptable response depends on the runner's
          # environment (e.g. /wifi-scan/scan: 200 on a real Windows host
          # with WiFi, 503 on a headless CI VM with no wlansvc).
          # Usage: probe <label> <url> <expected_status[|alt[|alt]]>
          # X-MHP-Token is sent on every probe; harmless on public endpoints,
          # required on the rest (see backend/lib/auth.py).
          fail=0
          probe() {
            local label="$1" url="$2" want="$3"
            local got
            got=$(curl -s -o "$RUNNER_TEMP/body.txt" -w "%{http_code}" --max-time 15 -H "X-MHP-Token: $TOKEN" "$url" || echo 000)
            local body
            body=$(head -c 200 "$RUNNER_TEMP/body.txt" | tr '\n' ' ')
            local match=0
            local IFS='|'
            for w in $want; do
              if [ "$got" = "$w" ]; then match=1; break; fi
            done
            if [ "$match" = "1" ]; then
              echo "  OK   $got  $label  -> $body"
            else
              echo "::warning::FAIL $got (want $want)  $label  -> $body"
              fail=$((fail + 1))
            fi
          }

          echo "::group::Endpoint probes"
          probe "health"             "http://127.0.0.1:8765/health"              200
          probe "system/info"        "http://127.0.0.1:8765/system/info"         200
          probe "hash/algorithms"    "http://127.0.0.1:8765/hash/algorithms"     200
          probe "stego/info"         "http://127.0.0.1:8765/stego/info"          200
          probe "ip/8.8.8.8"         "http://127.0.0.1:8765/ip/8.8.8.8"          200
          probe "persistence/audit"  "http://127.0.0.1:8765/persistence/audit"   200
          # Windows-only — runs on the CI VM; should respond cleanly even if some
          # sections (BitLocker on an unsupported volume, etc.) return partial.
          probe "windows/posture"    "http://127.0.0.1:8765/windows/posture"     200
          # Mac/Linux-only — expect 501 (not 500), proves the guard, not a crash
          probe "macos/posture"      "http://127.0.0.1:8765/macos/posture"       501
          probe "linux/posture"      "http://127.0.0.1:8765/linux/posture"       501
          probe "wifi/report"        "http://127.0.0.1:8765/wifi/report"         501
          # wifi-scan: 200 on a real Windows machine with WiFi, 503 on CI VMs
          # where the Wireless AutoConfig Service (wlansvc) isn't running.
          probe "wifi-scan/scan"     "http://127.0.0.1:8765/wifi-scan/scan"      "200|503"
          probe "tcpdump/status"     "http://127.0.0.1:8765/tcpdump/status"      501
          probe "bt/status"          "http://127.0.0.1:8765/bt/status"           501
          probe "wpa-capture/status" "http://127.0.0.1:8765/wpa-capture/status"  501
          echo "::endgroup::"

          # Verify the sidecar correctly self-identifies as Windows.
          if ! grep -q '"is_windows":true' "$RUNNER_TEMP/health.json" 2>/dev/null; then
            # health endpoint doesn't return this; use /system/info instead
            curl -fsS -H "X-MHP-Token: $TOKEN" http://127.0.0.1:8765/system/info > "$RUNNER_TEMP/sys.json"
            cat "$RUNNER_TEMP/sys.json"; echo
            if ! grep -q '"is_windows":true' "$RUNNER_TEMP/sys.json"; then
              echo "::error::sidecar did not self-report as Windows"
              fail=$((fail + 1))
            fi
          fi

          # Shut sidecar down cleanly; surface its log either way.
          taskkill //F //IM network-tools-backend.exe 2>/dev/null || true
          echo "::group::Sidecar log (tail)"
          tail -n 50 "$LOG" 2>/dev/null || echo "(no log)"
          echo "::endgroup::"

          if [ "$fail" -gt 0 ]; then
            echo "::error::$fail endpoint probe(s) failed"
            exit 1
          fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build React renderer
        working-directory: frontend
        run: npx tsc && npx vite build

      - name: Package with electron-builder
        working-directory: frontend
        env:
          # Skip code signing — we don't have certs configured here.
          # On macOS this leaves the app unsigned (user gets a Gatekeeper
          # warning on first launch); fine for personal use.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.target_args }} --publish never

      - name: Pack macOS .app with ditto
        # Pack the .app HERE on the macOS runner — `ditto` is macOS-only
        # and the bundle still has its xattrs intact. The release job
        # downloads this pre-made zip; doing it Linux-side would strip
        # the bundle metadata and produce a Gatekeeper-rejected archive.
        if: matrix.os == 'macos-latest'
        working-directory: frontend/dist-electron
        run: |
          APP_DIR=$(find . -maxdepth 3 -type d -name "*.app" | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::no .app found under frontend/dist-electron"
            ls -la
            exit 1
          fi
          APP_PARENT=$(dirname "$APP_DIR")
          APP_NAME=$(basename "$APP_DIR")
          echo "packing $APP_DIR -> HackingPal-macos-arm64.zip"
          (cd "$APP_PARENT" && ditto -c -k --keepParent "$APP_NAME" "HackingPal-macos-arm64.zip")
          ls -lh "$APP_PARENT/HackingPal-macos-arm64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HackingPal-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

  smoke-linux:
    name: Smoke test (Linux AppImage)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: HackingPal-ubuntu-latest
          path: artifacts/

      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 jq

      - name: Extract AppImage
        working-directory: artifacts
        run: |
          chmod +x *.AppImage
          ./*.AppImage --appimage-extract > /dev/null
          ls squashfs-root/resources/backend/network-tools-backend/ | head -20

      - name: Run sidecar directly (bypass Electron)
        # If the sidecar can't boot, the Electron GUI can't help. Run the
        # PyInstaller binary directly so we capture its stderr instead of
        # losing it through Electron's spawn().
        run: |
          cd artifacts/squashfs-root/resources/backend/network-tools-backend
          ./network-tools-backend > /tmp/sidecar.log 2>&1 &
          echo $! > /tmp/sidecar.pid
          echo "sidecar launched, pid=$(cat /tmp/sidecar.pid)"

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8765/health > /tmp/health.json 2>/dev/null; then
              echo "::notice::backend healthy after ${i}s"
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "::error::backend never became ready after 60s"
          exit 1

      - name: Probe key endpoints
        run: |
          # Fetch the per-launch token. Loopback-only, no header required.
          TOKEN=$(curl -fsS http://127.0.0.1:8765/auth/token | jq -r .token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::failed to fetch auth token from /auth/token"
            exit 1
          fi
          echo "::notice::fetched auth token (len=${#TOKEN})"

          probe() {
            local label="$1" url="$2"
            echo "::group::$label  $url"
            if curl -fsS --max-time 10 -H "X-MHP-Token: $TOKEN" "$url" | jq . ; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::warning::$label failed"
              return 1
            fi
          }

          # platform detection — confirms mac-only routers report as unavailable
          probe "/system/info"                 "http://127.0.0.1:8765/system/info"
          # non-privileged tools
          probe "/ip/8.8.8.8"                  "http://127.0.0.1:8765/ip/8.8.8.8"
          probe "/whois/example.com"           "http://127.0.0.1:8765/whois/example.com" || true
          probe "/dns/recon/example.com"       "http://127.0.0.1:8765/dns/recon/example.com?confirm=true" || true
          # validates the Linux codesign short-circuit fix
          probe "/processes/list"              "http://127.0.0.1:8765/processes/list" || true
          # mac-only — should return 501 with a hint, NOT crash
          echo "::group::/macos/posture (expect 501)"
          curl -sS -o /tmp/posture.json -w "HTTP %{http_code}\n" -H "X-MHP-Token: $TOKEN" http://127.0.0.1:8765/macos/posture || true
          cat /tmp/posture.json | jq . 2>/dev/null || cat /tmp/posture.json
          echo "::endgroup::"

      - name: Tail sidecar log
        if: always()
        run: |
          echo "::group::Full sidecar log"
          cat /tmp/sidecar.log 2>/dev/null || echo "(no log)"
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/sidecar.pid ]; then
            kill $(cat /tmp/sidecar.pid) 2>/dev/null || true
          fi
          pkill -f network-tools-backend 2>/dev/null || true

  release:
    # Attaches the matrix artifacts to a GitHub Release on tag pushes
    # (vX.Y.Z or vX.Y.Z-suffix). Reuses the build job's outputs rather than
    # rebuilding so tag-push CI stays the same length as a normal main push.
    name: Publish release assets
    needs: [build, smoke-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: HackingPal-macos-latest
          path: artifacts/macos/

      - name: Download Windows artifact
        # Windows is best-effort (see build job's continue-on-error). If it
        # didn't produce an artifact this run, the release still ships Mac +
        # Linux; the Stage step's Windows section is gated on the .exe existing.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: HackingPal-windows-latest
          path: artifacts/windows/

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: HackingPal-ubuntu-latest
          path: artifacts/linux/

      - name: Stage release assets
        # electron-builder filenames embed the version, so normalize them
        # to the stable names the README + release notes link to. We also
        # ship the auto-updater metadata files (latest*.yml) so installed
        # apps using electron-updater can detect new releases via GitHub.
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "::group::macOS — DMG + zipped .app fallback + updater metadata"
          MAC_DMG=$(find artifacts/macos -maxdepth 3 -type f -name "*.dmg" | head -1)
          if [ -z "$MAC_DMG" ]; then
            echo "::error::macOS .dmg not found"
            find artifacts/macos -maxdepth 3
            exit 1
          fi
          echo "found: $MAC_DMG"
          cp "$MAC_DMG" release-assets/HackingPal-macos-arm64.dmg
          # Copy the pre-made .app zip. The macOS build job packs it with
          # `ditto -c -k --keepParent` on the macOS runner (where ditto
          # exists and the bundle still has its xattrs intact). Re-packing
          # here on Linux is impossible (ditto is macOS-only) and would
          # produce a Gatekeeper-rejected bundle anyway since upload-artifact
          # has already stripped the xattrs by this point.
          MAC_ZIP=$(find artifacts/macos -maxdepth 3 -type f -name "HackingPal-macos-arm64.zip" | head -1)
          if [ -z "$MAC_ZIP" ]; then
            echo "::error::macOS .app zip not found — did the macOS build job's ditto step run?"
            find artifacts/macos -maxdepth 3
            exit 1
          fi
          cp "$MAC_ZIP" release-assets/HackingPal-macos-arm64.zip
          # latest-mac.yml drives electron-updater on Mac.
          MAC_YML=$(find artifacts/macos -maxdepth 3 -type f -name "latest-mac.yml" | head -1)
          if [ -n "$MAC_YML" ]; then cp "$MAC_YML" release-assets/; fi
          echo "::endgroup::"

          echo "::group::Windows — NSIS installer + updater metadata (best-effort)"
          # Windows is best-effort — if the build job didn't produce an .exe,
          # skip the Windows section instead of failing the release. Mac + Linux
          # are the supported targets.
          WIN_EXE=$(find artifacts/windows -maxdepth 2 -type f -name "*Setup*.exe" 2>/dev/null | head -1)
          if [ -z "$WIN_EXE" ]; then
            echo "::notice::no Windows installer this run — releasing Mac + Linux only"
          else
            echo "found: $WIN_EXE"
            cp "$WIN_EXE" release-assets/HackingPal-windows-x64.exe
            # latest.yml drives electron-updater on Windows; the .blockmap
            # enables differential updates so users only re-download the
            # changed bytes between versions.
            WIN_YML=$(find artifacts/windows -maxdepth 2 -type f -name "latest.yml" | head -1)
            if [ -n "$WIN_YML" ]; then cp "$WIN_YML" release-assets/; fi
            WIN_BLOCKMAP=$(find artifacts/windows -maxdepth 2 -type f -name "*Setup*.exe.blockmap" | head -1)
            if [ -n "$WIN_BLOCKMAP" ]; then
              cp "$WIN_BLOCKMAP" release-assets/HackingPal-windows-x64.exe.blockmap
            fi
          fi
          echo "::endgroup::"

          echo "::group::Linux — AppImage (x86_64) + updater metadata"
          # The arm64 AppImage lives in HackingPal-ubuntu-24.04-arm and is
          # deliberately not attached to releases yet — release notes only
          # promise x86_64.
          LINUX_APPIMAGE=$(find artifacts/linux -maxdepth 2 -type f -name "*.AppImage" | head -1)
          if [ -z "$LINUX_APPIMAGE" ]; then
            echo "::error::Linux AppImage not found"
            find artifacts/linux -maxdepth 2
            exit 1
          fi
          echo "found: $LINUX_APPIMAGE"
          cp "$LINUX_APPIMAGE" release-assets/HackingPal-linux-x86_64.AppImage
          LINUX_YML=$(find artifacts/linux -maxdepth 2 -type f -name "latest-linux.yml" | head -1)
          if [ -n "$LINUX_YML" ]; then cp "$LINUX_YML" release-assets/; fi
          echo "::endgroup::"

          ls -lh release-assets/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          make_latest: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') }}
          files: release-assets/*
          fail_on_unmatched_files: true
