# Build the MyHackingPal desktop app on a matrix of OSes.
#
# PyInstaller can only build for the OS it runs on — that's why this uses a
# matrix instead of cross-compiling. Each runner produces its native sidecar
# binary, then electron-builder packages it for that OS.
#
# Manual run:  Actions → "Build desktop app" → Run workflow
# Auto run:    push to main or any PR

name: Build desktop app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            sidecar_path: backend/dist/network-tools-backend.exe
            artifact_glob: "frontend/dist-electron/*.{exe,msi,nupkg,blockmap}"
          - os: ubuntu-latest
            target: linux
            sidecar_path: backend/dist/network-tools-backend
            artifact_glob: "frontend/dist-electron/*.{AppImage,deb,snap}"
          - os: macos-latest
            target: mac
            sidecar_path: backend/dist/network-tools-backend
            artifact_glob: "frontend/dist-electron/mac*/**"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-bundle.txt

      - name: Install backend bundle deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt

      - name: Build PyInstaller sidecar
        working-directory: backend
        run: pyinstaller network-tools-backend.spec --noconfirm

      - name: Verify sidecar exists
        shell: bash
        run: |
          if [[ ! -f "${{ matrix.sidecar_path }}" ]]; then
            echo "::error::sidecar not at ${{ matrix.sidecar_path }}"
            ls -la backend/dist/
            exit 1
          fi
          ls -lh "${{ matrix.sidecar_path }}"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build React renderer
        working-directory: frontend
        run: npx tsc && npx vite build

      - name: Package with electron-builder
        working-directory: frontend
        env:
          # Skip code signing — we don't have certs configured here.
          # On macOS this leaves the app unsigned (user gets a Gatekeeper
          # warning on first launch); fine for personal use.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyHackingPal-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14
