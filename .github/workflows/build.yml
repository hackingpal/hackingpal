# Build the MyHackingPal desktop app on a matrix of OSes.
#
# PyInstaller can only build for the OS it runs on — that's why this uses a
# matrix instead of cross-compiling. Each runner produces its native sidecar
# binary, then electron-builder packages it for that OS.
#
# Manual run:  Actions → "Build desktop app" → Run workflow
# Auto run:    push to main or any PR

name: Build desktop app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend.exe
            artifact_glob: |
              frontend/dist-electron/*.exe
              frontend/dist-electron/*.msi
              frontend/dist-electron/*.nupkg
              frontend/dist-electron/*.blockmap
          - os: ubuntu-latest
            target: linux
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend
            artifact_glob: |
              frontend/dist-electron/*.AppImage
              frontend/dist-electron/*.deb
              frontend/dist-electron/*.snap
          - os: macos-latest
            target: mac
            sidecar_path: backend/dist/network-tools-backend/network-tools-backend
            artifact_glob: |
              frontend/dist-electron/mac*/**

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-bundle.txt

      - name: Install backend bundle deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt

      - name: Build PyInstaller sidecar
        working-directory: backend
        run: pyinstaller network-tools-backend.spec --noconfirm

      - name: Verify sidecar exists
        shell: bash
        run: |
          if [[ ! -f "${{ matrix.sidecar_path }}" ]]; then
            echo "::error::sidecar not at ${{ matrix.sidecar_path }}"
            ls -la backend/dist/
            exit 1
          fi
          ls -lh "${{ matrix.sidecar_path }}"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build React renderer
        working-directory: frontend
        run: npx tsc && npx vite build

      - name: Package with electron-builder
        working-directory: frontend
        env:
          # Skip code signing — we don't have certs configured here.
          # On macOS this leaves the app unsigned (user gets a Gatekeeper
          # warning on first launch); fine for personal use.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyHackingPal-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

  smoke-linux:
    name: Smoke test (Linux AppImage)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MyHackingPal-ubuntu-latest
          path: artifacts/

      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb jq

      - name: Launch AppImage under xvfb
        run: |
          chmod +x artifacts/*.AppImage
          # --no-sandbox: CI runners can't grant the SUID sandbox cap
          # --disable-gpu: no GPU on headless runner
          # &: background so we can poll /health while it runs
          xvfb-run -a -- artifacts/*.AppImage --no-sandbox --disable-gpu > app.log 2>&1 &
          echo $! > app.pid
          echo "launched, pid=$(cat app.pid)"

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8765/health > /tmp/health.json 2>/dev/null; then
              echo "::notice::backend healthy after ${i}s"
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "::error::backend never became ready after 60s"
          exit 1

      - name: Probe key endpoints
        run: |
          probe() {
            local label="$1" url="$2"
            echo "::group::$label  $url"
            if curl -fsS --max-time 10 "$url" | jq . ; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::warning::$label failed"
              return 1
            fi
          }

          # platform detection — confirms mac-only routers report as unavailable
          probe "/system/info"                 "http://127.0.0.1:8765/system/info"
          # non-privileged tools
          probe "/ip/8.8.8.8"                  "http://127.0.0.1:8765/ip/8.8.8.8"
          probe "/whois/example.com"           "http://127.0.0.1:8765/whois/example.com" || true
          probe "/dns/recon/example.com"       "http://127.0.0.1:8765/dns/recon/example.com" || true
          # validates the Linux codesign short-circuit fix
          probe "/processes/list"              "http://127.0.0.1:8765/processes/list" || true
          # mac-only — should return 503 with a hint, NOT crash
          echo "::group::/macos/posture (expect 503)"
          curl -sS -o /tmp/posture.json -w "HTTP %{http_code}\n" http://127.0.0.1:8765/macos/posture || true
          cat /tmp/posture.json | jq . 2>/dev/null || cat /tmp/posture.json
          echo "::endgroup::"

      - name: Tail app log
        if: always()
        run: |
          echo "::group::Full app log"
          cat app.log || true
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
          fi
          # also kill any orphan xvfb / electron / sidecar
          pkill -f MyHackingPal 2>/dev/null || true
          pkill -f network-tools-backend 2>/dev/null || true
